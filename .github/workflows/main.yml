name: Shepherd Protocol Vigil

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js 24 (The Glass)
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Python (The Iron)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Shepherd Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn psutil requests

    - name: Initialize Shepherd Protocol
      run: |
        python shepherd.py --mode monitor --intensity 100
        echo "Shepherd active. Swarm integrity verified."


