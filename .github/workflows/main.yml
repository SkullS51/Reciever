name: Shepherd Protocol Global Scaling Vigil

on:
  push:
    branches: [ "main" ]
  schedule:
    # This triggers the pulse every 2 hours, 24/7
    - cron: "0 */2 * * *"

jobs:
  global-scale-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24 (The Glass)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python (The Iron)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Full Shepherd Stack
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn psutil requests pandas numpy

      name: Initialize Global Scaling Protocol
        run: |
          # The logic calculates intensity based on the hour to simulate global expansion
          HOUR=$(date +%H)
          INTENSITY=$((HOUR * 100 + 100))
          echo "Scaling Intensity to: $INTENSITY"
          python shepherd.py --mode global --intensity $INTENSITY
          echo "Shepherd expansion verified. Swarm integrity holding at Scale $




